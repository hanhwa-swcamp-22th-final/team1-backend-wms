spring:
  application:
    name: team1-backend-wms

  lifecycle:
    timeout-per-shutdown-phase: 30s

  cloud:
    openfeign:
      okhttp:
        enabled: true

  datasource:
    # Docker: SPRING_DATASOURCE_URL 환경변수로 주입 (wms-db:3306)
    # 로컬 직접 실행: 기본값 localhost:3311 사용
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3311/wms_db?useSSL=false&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:temp_password}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:wms-billing}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  shutdown: graceful

app:
  kafka:
    topics:
      billing-monthly-result: billing.monthly.result.v1
    consumer:
      billing-monthly-result-auto-startup: true

wms:
  stub-clients:
    enabled: false
  invoice-jobs:
    enabled: true
    fixed-delay-ms: 5000
    batch-size: 10
  clients:
    member:
      base-url: ${MEMBER_SERVICE_URL:http://localhost:8081}
    order:
      base-url: ${ORDER_SERVICE_URL:http://localhost:8082}
    integration:
      base-url: ${INTEGRATION_SERVICE_URL:http://localhost:8084}
