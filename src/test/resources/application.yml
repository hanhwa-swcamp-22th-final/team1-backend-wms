spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  kafka:
    bootstrap-servers: localhost:9094
    consumer:
      group-id: test-wms-billing
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

app:
  kafka:
    topics:
      billing-monthly-result: billing.monthly.result.v1
    consumer:
      billing-monthly-result-auto-startup: false

wms:
  stub-clients:
    enabled: true
